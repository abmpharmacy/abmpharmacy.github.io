<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Prescription | ABM Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm py-4 px-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-emerald-600">ABM PHARMACY</h1>
        <div class="space-x-4 text-sm font-medium">
            <a href="index.html" class="text-slate-600">Home</a>
            <a href="prescription.html" class="text-emerald-600 border-b-2 border-emerald-600">Upload Prescription</a>
        </div>
        <a href="tel:0768961778" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-full font-bold text-sm">Call: 076 896 1778</a>
    </nav>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto mt-10 bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        <!-- Sidebar -->
        <div class="bg-slate-950 p-12 text-white md:w-1/3" style="background-image: linear-gradient(to bottom right, #064e3b, #020617);">
            <h2 class="text-3xl font-bold mb-6">Quick & Secure Order</h2>
            <p class="text-emerald-100/70 text-sm mb-8">Please upload a clear photograph of your medical prescription.</p>
            <div class="space-y-4 text-sm">
                <p>🛡️ 100% Genuine Medicines Only</p>
                <p>❄️ Temperature Controlled Storage</p>
            </div>
        </div>

        <!-- Form -->
        <div class="p-12 md:w-2/3">
            <h2 class="text-2xl font-bold mb-1">Upload Prescription</h2>
            <div class="space-y-4 mt-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Select Pharmacy</label>
                    <select id="pharmacySelect" class="w-full px-4 py-2 border border-slate-300 rounded-xl mt-1">
                        <option value="94768961778">ABM Pharmacy (076 896 1778)</option>
                        <option value="94712068006">Sirikatha Pharmacy (071 206 8006)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Your Name</label>
                    <input type="text" id="userName" class="w-full px-4 py-2 border border-slate-300 rounded-xl mt-1" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">WhatsApp Number</label>
                    <input type="tel" id="userPhone" class="w-full px-4 py-2 border border-slate-300 rounded-xl mt-1" placeholder="0771234567">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Upload Photo</label>
                    <input type="file" id="prescriptionFile" class="w-full px-4 py-2 border-2 border-dashed border-slate-300 rounded-xl mt-1 cursor-pointer">
                </div>
                <button onclick="sendToWhatsApp()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Submit via WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        function sendToWhatsApp() {
            const phone = document.getElementById('pharmacySelect').value;
            const name = document.getElementById('userName').value;
            const userPhone = document.getElementById('userPhone').value;
            const fileInput = document.getElementById('prescriptionFile');

            if(name && userPhone) {
                // සටහන: WhatsApp හරහා ෆයිල් එක කෙලින්ම යැවීමට නොහැකි නිසා, 
                // මෙතනදී පාරිභෝගිකයාට පණිවිඩය සමඟ ෆයිල් එක ගැන දැනුවත් කිරීමක් කරනු ලැබේ.
                const message = `Hello, I am ${name}. My number is ${userPhone}. I have attached my prescription.`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            } else {
                alert("Please fill in your name and phone number!");
            }
        }
    </script>
</body>
</html>
