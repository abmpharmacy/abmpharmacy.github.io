<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Prescription | ABM Pharmacy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    
    <div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold mb-6">Upload Prescription</h2>
        <p class="text-sm text-slate-500 mb-6">Please fill in your details to send the prescription via WhatsApp.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Select Pharmacy</label>
                <select id="pharmacySelect" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="ABM">ABM Pharmacy (076 896 1778)</option>
                    <option value="Sirikatha">Sirikatha Pharmacy (071 206 8006)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Your Name</label>
                <input type="text" id="userName" placeholder="John Doe" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">WhatsApp Number</label>
                <input type="tel" id="userPhone" placeholder="0771234567" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Upload Photo</label>
                <div class="border-2 border-dashed border-slate-200 rounded-lg p-6 text-center">
                    <p class="text-sm text-slate-400">Click to capture or choose file</p>
                </div>
            </div>

            <button onclick="sendToWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition">
                Submit via WhatsApp
            </button>
        </div>
    </div>

    <script>
        function sendToWhatsApp() {
            const pharmacy = document.getElementById('pharmacySelect').value;
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            
            // ෆාමසිය අනුව අදාළ WhatsApp අංකය තෝරාගැනීම
            let whatsappNumber = (pharmacy === 'ABM') ? '94768961778' : '94712068006';
            
            if(name && phone) {
                // මැසේජ් එක සැකසීම
                const message = `Hello, I would like to order medicine.%0A%0APharmacy: ${pharmacy}%0AName: ${name}%0APhone: ${phone}`;
                window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
            } else {
                alert("Please fill in your name and phone number!");
            }
        }
    </script>
</body>
</html>
